<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SudoSLVRR Main Menu</title>
  <style>
    @font-face {
      font-family: 'VAG Rounded Next Shine';
      src: url("{{ url_for('static', filename='fonts/iCielVAGRoundedNextShine-Regular.otf') }}") format('opentype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * { box-sizing: border-box; }

    body {
      background-color: #1c1c1e;
      background-image: url("{{ url_for('static', filename='SudoSLVRR_BG.png') }}");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      margin: 0;
      font-family: 'VAG Rounded Next Shine', 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }

    .main-container {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      width: 95vw;
      max-width: 1600px;
      padding: 40px 2%;
      gap: 40px;
    }

    .logo-container {
      flex: 1;
      display: flex;
      justify-content: flex-start;
      min-width: 0;
    }

    .game-logo {
      max-width: 100%;
      height: auto;
      filter: drop-shadow(0px 8px 15px rgba(0, 0, 0, 0.4));
    }

    .menu-wrapper {
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
      margin-right: 2%;
      flex-shrink: 0;
    }

    nav {
      display: flex;
      flex-direction: column;
      gap: 18px;
      align-items: center;
      width: 100%;
    }

    .game-btn,
    .upload-modal-actions button {
      display: block;
      width: 100%;
      max-width: 420px;
      min-width: min(350px, 100%);
      padding: 18px 20px;
      text-align: center;
      text-decoration: none;
      font-family: 'VAG Rounded Next Shine', 'Segoe UI', system-ui, sans-serif;
      font-size: 26px;
      color: #902c21;
      text-transform: uppercase;
      background-color: #fcab3a;
      border: 4px solid #5a1d08;
      border-radius: 50px;
      box-shadow:
        inset 0px 5px 0px rgba(255, 220, 140, 0.7),
        inset 0px -6px 0px rgba(212, 107, 21, 0.8),
        0px 6px 10px rgba(0, 0, 0, 0.5);
      cursor: pointer;
      user-select: none;
      transition: transform 0.1s ease, box-shadow 0.1s ease, background-color 0.2s ease;
    }

    .game-btn:hover,
    .upload-modal-actions button:hover {
      background-color: #fdb752;
      transform: translateY(-2px);
      box-shadow:
        inset 0px 5px 0px rgba(255, 220, 140, 0.8),
        inset 0px -6px 0px rgba(212, 107, 21, 0.8),
        0px 10px 15px rgba(0, 0, 0, 0.6);
    }

    .game-btn:active,
    .upload-modal-actions button:active {
      transform: translateY(4px);
      box-shadow:
        inset 0px 2px 0px rgba(255, 220, 140, 0.5),
        inset 0px -2px 0px rgba(212, 107, 21, 0.8),
        0px 2px 5px rgba(0, 0, 0, 0.4);
    }

    button.game-btn {
      -webkit-appearance: none;
      appearance: none;
    }

    .upload-modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      z-index: 30;
    }
    .upload-modal {
      width: min(420px, 100%);
      background: rgba(24, 14, 28, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 1rem;
      text-align: center;
      color: #ffffff;
    }
    .upload-modal h3 {
      margin: 0 0 0.5rem 0;
      color: #fcab3a;
    }
    .upload-modal p { margin: 0 0 1rem 0; }
    .upload-modal-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .toast-container {
      position: fixed;
      right: 1rem;
      bottom: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      z-index: 40;
    }
    .toast-item {
      background: rgba(24, 14, 28, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #ffffff;
      border-radius: 8px;
      padding: 0.55rem 0.8rem;
      font-size: 0.85rem;
      max-width: 320px;
    }
    .toast-item.error { border-color: #f7768e; }

    @media (max-width: 900px) {
      body {
        background-attachment: scroll;
      }
      .main-container {
        flex-direction: column;
        justify-content: center;
        padding: 28px 20px 40px;
        width: 100%;
        gap: 24px;
      }
      .logo-container {
        justify-content: center;
        margin-bottom: 10px;
      }
      .menu-wrapper {
        margin-right: 0;
        width: 100%;
        max-width: 420px;
      }
      .game-btn,
      .upload-modal-actions button {
        min-width: min(300px, 100%);
        font-size: clamp(18px, 4.5vw, 26px);
        padding: 16px 16px;
      }
      .upload-modal-actions {
        flex-direction: column;
      }
      .upload-modal-actions button {
        min-width: 0;
      }
      .toast-container {
        left: 1rem;
        right: 1rem;
        bottom: 1rem;
      }
      .toast-item {
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="logo-container">
      <img src="{{ url_for('static', filename='SudoSLVRR_Logo.png') }}" alt="SudoSLVRR Logo" class="game-logo" decoding="async">
    </div>
    <div class="menu-wrapper">
      <nav>
        <a href="{{ url_for('experiment_page') }}" class="game-btn">Experiment Mode</a>
        <a href="{{ url_for('game_page') }}" class="game-btn">Game Mode</a>
        <a href="{{ url_for('create_page') }}" class="game-btn">Create Puzzle</a>
        <button type="button" class="game-btn" id="uploadBtn">Upload Puzzle</button>
        <input type="file" id="uploadInput" accept=".txt" style="display: none;">
        <a href="{{ url_for('how_to_play_page') }}" class="game-btn">How to Play?</a>
        <a href="{{ url_for('about_page') }}" class="game-btn">About Game</a>
      </nav>
    </div>
  </div>
  <div id="uploadModalBackdrop" class="upload-modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="uploadModeTitle">
    <div class="upload-modal">
      <h3 id="uploadModeTitle">Where do you want to play this puzzle?</h3>
      <p>Select a mode to continue.</p>
      <div class="upload-modal-actions">
        <button type="button" id="uploadToExperiment">Experiment Mode</button>
        <button type="button" id="uploadToGame">Game Mode</button>
      </div>
    </div>
  </div>
  <div id="resumeUploadBackdrop" class="upload-modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="resumeUploadTitle" style="display: none;">
    <div class="upload-modal">
      <h3 id="resumeUploadTitle">Saved progress</h3>
      <p>This file includes a saved game. Continue your last progress, or start fresh from the original clues only.</p>
      <div class="upload-modal-actions">
        <button type="button" id="resumeUploadFresh">Start fresh</button>
        <button type="button" id="resumeUploadContinue">Continue progress</button>
      </div>
    </div>
  </div>
  <div id="toastContainer" class="toast-container" aria-live="polite"></div>
  <script src="{{ url_for('static', filename='js/upload-puzzle-parse.js') }}"></script>
  <script>
    const uploadModalBackdrop = document.getElementById('uploadModalBackdrop');
    const uploadToExperiment = document.getElementById('uploadToExperiment');
    const uploadToGame = document.getElementById('uploadToGame');
    const resumeUploadBackdrop = document.getElementById('resumeUploadBackdrop');
    const resumeUploadFresh = document.getElementById('resumeUploadFresh');
    const resumeUploadContinue = document.getElementById('resumeUploadContinue');
    const toastContainer = document.getElementById('toastContainer');
    let uploadedPuzzlePayload = null;

    function promptResumeProgressOrFresh() {
      return new Promise(function (resolve) {
        if (!resumeUploadBackdrop || !resumeUploadFresh || !resumeUploadContinue) {
          resolve('continue');
          return;
        }
        function cleanup() {
          resumeUploadBackdrop.style.display = 'none';
          resumeUploadFresh.removeEventListener('click', onFresh);
          resumeUploadContinue.removeEventListener('click', onContinue);
          resumeUploadBackdrop.removeEventListener('click', onBackdrop);
        }
        function onFresh() {
          cleanup();
          resolve('fresh');
        }
        function onContinue() {
          cleanup();
          resolve('continue');
        }
        function onBackdrop(e) {
          if (e.target === resumeUploadBackdrop) {
            cleanup();
            resolve(null);
          }
        }
        resumeUploadBackdrop.style.display = 'flex';
        resumeUploadFresh.addEventListener('click', onFresh);
        resumeUploadContinue.addEventListener('click', onContinue);
        resumeUploadBackdrop.addEventListener('click', onBackdrop);
      });
    }

    function showToast(message, isError) {
      if (!toastContainer) return;
      const t = document.createElement('div');
      t.className = 'toast-item' + (isError ? ' error' : '');
      t.textContent = String(message || '');
      toastContainer.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    function hideUploadModal() {
      if (uploadModalBackdrop) uploadModalBackdrop.style.display = 'none';
    }

    function showUploadModal(payload) {
      uploadedPuzzlePayload = payload;
      if (uploadModalBackdrop) uploadModalBackdrop.style.display = 'flex';
    }

    function routeUploadedPuzzle(targetMode) {
      if (!uploadedPuzzlePayload) return;
      sessionStorage.setItem('uploadedPuzzle', JSON.stringify(uploadedPuzzlePayload));
      const dest = targetMode === 'game'
        ? '{{ url_for("game_page") }}'
        : '{{ url_for("experiment_page") }}';
      window.location.href = dest;
    }

    if (uploadToExperiment) {
      uploadToExperiment.addEventListener('click', function() { routeUploadedPuzzle('experiment'); });
    }
    if (uploadToGame) {
      uploadToGame.addEventListener('click', function() { routeUploadedPuzzle('game'); });
    }
    if (uploadModalBackdrop) {
      uploadModalBackdrop.addEventListener('click', function(e) {
        if (e.target === uploadModalBackdrop) hideUploadModal();
      });
    }

    document.getElementById('uploadBtn').addEventListener('click', function() {
      document.getElementById('uploadInput').click();
    });
    document.getElementById('uploadInput').addEventListener('change', function(e) {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async function() {
        try {
          const text = reader.result;
          const parseFn = window.UploadPuzzleParse && window.UploadPuzzleParse.parsePuzzleFileText;
          if (typeof parseFn !== 'function') throw new Error('Puzzle parser is not loaded');
          const parsed = parseFn(text);
          if (!parsed.ok) throw new Error(parsed.error || 'Invalid puzzle file');
          const order = parsed.order;
          let puzzle = parsed.puzzle;
          let initialPuzzleStr =
            parsed.initialPuzzle != null ? parsed.initialPuzzle : puzzle;

          if (parsed.format === 'dual' && parsed.progressNotSolved) {
            const choice = await promptResumeProgressOrFresh();
            if (choice === null) {
              e.target.value = '';
              return;
            }
            if (choice === 'fresh') {
              puzzle = parsed.initialPuzzle;
              initialPuzzleStr = parsed.initialPuzzle;
            } else {
              puzzle = parsed.currentPuzzle;
              initialPuzzleStr = parsed.initialPuzzle;
            }
          } else if (parsed.format === 'dual' && !parsed.progressNotSolved) {
            puzzle = parsed.initialPuzzle;
            initialPuzzleStr = parsed.initialPuzzle;
          }

          let libraryPath = null;
          try {
            const checkResp = await fetch('/api/library/find', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ order: order, puzzle: initialPuzzleStr })
            });
            const checkData = await checkResp.json().catch(() => ({}));
            if (checkResp.ok && checkData.exists && checkData.match && checkData.match.path) {
              libraryPath = checkData.match.path;
            }
          } catch (_) {}
          showUploadModal({
            order: order,
            puzzle: puzzle,
            initialPuzzle: initialPuzzleStr,
            name: file.name,
            filename: file.name,
            libraryPath: libraryPath
          });
        } catch (err) {
          showToast(err.message || 'Failed to parse puzzle file.', true);
        }
        e.target.value = '';
      };
      reader.onerror = function() { showToast('Could not read file.', true); e.target.value = ''; };
      reader.readAsText(file, 'utf-8');
    });
  </script>
</body>
</html>
